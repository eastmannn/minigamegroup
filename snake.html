<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .top-bar {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .home-btn {
      padding: 6px 14px;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .home-btn:hover { border-color: #e94560; color: #eee; }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    .info-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 14px;
      font-size: 1.1rem;
    }

    .info-bar span { color: #e94560; font-weight: bold; }

    canvas {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 8px;
      display: block;
    }

    #message {
      margin-top: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 32px;
      color: #f1c40f;
      text-align: center;
    }

    .btn-row {
      margin-top: 14px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background: #c73652; transform: translateY(-2px); }

    .hint {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a class="home-btn" href="index.html">← 홈으로</a>
    <h1>뱀 게임</h1>
    <div style="width:72px"></div>
  </div>

  <div class="info-bar">
    <div>점수: <span id="score">0</span></div>
    <div>최고: <span id="best">0</span></div>
  </div>

  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">시작 버튼을 누르세요</div>

  <div class="btn-row">
    <button id="startBtn" onclick="startGame()">시작</button>
  </div>
  <div class="hint">방향키로 조작 | 벽 · 몸통 충돌 시 게임 오버</div>

  <script>
    const CELL = 20;
    const COLS = 20;
    const ROWS = 20;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let snake, dir, nextDir, food, score, best, interval, running;

    best = 0;

    function startGame() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      running = true;
      document.getElementById('score').textContent = 0;
      document.getElementById('message').textContent = '';
      document.getElementById('startBtn').textContent = '재시작';
      clearInterval(interval);
      placeFood();
      interval = setInterval(tick, 150);
    }

    function placeFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let fx, fy;
      do {
        fx = Math.floor(Math.random() * COLS);
        fy = Math.floor(Math.random() * ROWS);
      } while (occupied.has(`${fx},${fy}`));
      food = { x: fx, y: fy };
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        if (score > best) {
          best = score;
          document.getElementById('best').textContent = best;
        }
        placeFood();
        const delay = Math.max(60, 150 - Math.floor(score / 100) * 10);
        clearInterval(interval);
        interval = setInterval(tick, delay);
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      clearInterval(interval);
      running = false;
      document.getElementById('message').textContent = `게임 오버! 점수: ${score}`;
      draw();
    }

    function draw() {
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#e94560';
      ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#2ecc71' : '#1a8a4a';
        ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
      });
    }

    document.addEventListener('keydown', e => {
      const keys = {
        ArrowUp:    { x: 0, y: -1 },
        ArrowDown:  { x: 0, y: 1 },
        ArrowLeft:  { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
      };
      const d = keys[e.key];
      if (!d) return;
      e.preventDefault();
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    });

    draw();
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
