<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .top-bar {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .home-btn {
      padding: 6px 14px;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .home-btn:hover { border-color: #e94560; color: #eee; }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    .score-row {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    .score-box {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 8px 20px;
      text-align: center;
      min-width: 90px;
    }

    .score-box .label {
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #e94560;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 88px);
      grid-template-rows: repeat(4, 88px);
      gap: 10px;
      background: #16213e;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #e94560;
    }

    .tile {
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 1.6rem;
      font-weight: 800;
      background: #0f3460;
      color: #eee;
      transition: background 0.1s;
    }

    .tile[data-val="2"]    { background: #1a4a6a; color: #eee; }
    .tile[data-val="4"]    { background: #0f5460; color: #eee; }
    .tile[data-val="8"]    { background: #e67e22; color: #fff; }
    .tile[data-val="16"]   { background: #e74c3c; color: #fff; }
    .tile[data-val="32"]   { background: #c0392b; color: #fff; }
    .tile[data-val="64"]   { background: #e94560; color: #fff; }
    .tile[data-val="128"]  { background: #f39c12; color: #fff; font-size: 1.3rem; }
    .tile[data-val="256"]  { background: #f1c40f; color: #333; font-size: 1.3rem; }
    .tile[data-val="512"]  { background: #2ecc71; color: #fff; font-size: 1.3rem; }
    .tile[data-val="1024"] { background: #27ae60; color: #fff; font-size: 1.1rem; }
    .tile[data-val="2048"] { background: #9b59b6; color: #fff; font-size: 1.1rem; }

    #message {
      margin-top: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 32px;
      color: #f1c40f;
      text-align: center;
    }

    .btn-row {
      margin-top: 14px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background: #c73652; transform: translateY(-2px); }

    .hint {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a class="home-btn" href="index.html">← 홈으로</a>
    <h1>2048</h1>
    <div style="width:72px"></div>
  </div>

  <div class="score-row">
    <div class="score-box">
      <div class="label">점수</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">최고</div>
      <div class="value" id="best">0</div>
    </div>
  </div>

  <div id="board"></div>
  <div id="message"></div>

  <div class="btn-row">
    <button onclick="newGame()">새 게임</button>
  </div>
  <div class="hint">방향키로 타일 이동 | 같은 숫자가 만나면 합쳐집니다</div>

  <script>
    let grid, score, best, gameOver, won;
    best = 0;

    function newGame() {
      grid = Array.from({ length: 4 }, () => Array(4).fill(0));
      score = 0;
      gameOver = false;
      won = false;
      document.getElementById('score').textContent = 0;
      document.getElementById('message').textContent = '';
      addTile();
      addTile();
      render();
    }

    function addTile() {
      const empty = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (grid[r][c] === 0) empty.push([r, c]);
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function slide(row) {
      const filtered = row.filter(v => v !== 0);
      let gained = 0;
      for (let i = 0; i < filtered.length - 1; i++) {
        if (filtered[i] === filtered[i + 1]) {
          filtered[i] *= 2;
          gained += filtered[i];
          filtered.splice(i + 1, 1);
        }
      }
      while (filtered.length < 4) filtered.push(0);
      return { row: filtered, gained };
    }

    function move(dir) {
      if (gameOver) return;
      let moved = false;

      let newGrid = grid.map(r => [...r]);

      if (dir === 'left') {
        for (let r = 0; r < 4; r++) {
          const { row, gained } = slide(newGrid[r]);
          if (row.join() !== newGrid[r].join()) moved = true;
          newGrid[r] = row;
          score += gained;
        }
      } else if (dir === 'right') {
        for (let r = 0; r < 4; r++) {
          const { row, gained } = slide([...newGrid[r]].reverse());
          const result = row.reverse();
          if (result.join() !== newGrid[r].join()) moved = true;
          newGrid[r] = result;
          score += gained;
        }
      } else if (dir === 'up') {
        for (let c = 0; c < 4; c++) {
          const col = [newGrid[0][c], newGrid[1][c], newGrid[2][c], newGrid[3][c]];
          const { row, gained } = slide(col);
          for (let r = 0; r < 4; r++) {
            if (newGrid[r][c] !== row[r]) moved = true;
            newGrid[r][c] = row[r];
          }
          score += gained;
        }
      } else if (dir === 'down') {
        for (let c = 0; c < 4; c++) {
          const col = [newGrid[0][c], newGrid[1][c], newGrid[2][c], newGrid[3][c]].reverse();
          const { row, gained } = slide(col);
          const result = row.reverse();
          for (let r = 0; r < 4; r++) {
            if (newGrid[r][c] !== result[r]) moved = true;
            newGrid[r][c] = result[r];
          }
          score += gained;
        }
      }

      if (!moved) return;

      grid = newGrid;
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        document.getElementById('best').textContent = best;
      }

      addTile();

      if (!won && grid.flat().includes(2048)) {
        won = true;
        document.getElementById('message').textContent = '2048 달성! 계속 플레이하세요!';
      } else if (isGameOver()) {
        gameOver = true;
        document.getElementById('message').textContent = `게임 오버! 점수: ${score}`;
      }

      render();
    }

    function isGameOver() {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) {
          if (grid[r][c] === 0) return false;
          if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
          if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
        }
      return true;
    }

    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          const v = grid[r][c];
          if (v > 0) {
            tile.textContent = v;
            tile.dataset.val = v;
          }
          board.appendChild(tile);
        }
    }

    document.addEventListener('keydown', e => {
      const map = {
        ArrowLeft: 'left', ArrowRight: 'right',
        ArrowUp: 'up', ArrowDown: 'down',
      };
      if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    });

    newGame();
  </script>
</body>
</html>
