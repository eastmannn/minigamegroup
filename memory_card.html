<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 뒤집기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .top-bar {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .home-btn {
      padding: 6px 14px;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .home-btn:hover { border-color: #e94560; color: #eee; }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    .info-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 14px;
      font-size: 1.1rem;
    }

    .info-bar span { color: #e94560; font-weight: bold; }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 10px;
    }

    .card-wrap {
      width: 80px;
      height: 80px;
      perspective: 600px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s;
      border-radius: 8px;
    }

    .card-wrap.flipped .card-inner,
    .card-wrap.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card-front {
      background: #0f3460;
      border: 2px solid #1a5a9a;
      color: #3a6a9a;
      font-size: 1.6rem;
    }

    .card-back {
      background: #16213e;
      border: 2px solid #e94560;
      transform: rotateY(180deg);
    }

    .card-wrap.matched .card-back {
      border-color: #2ecc71;
      background: #0d2b1a;
    }

    #message {
      margin-top: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 32px;
      color: #f1c40f;
      text-align: center;
    }

    .btn-row {
      margin-top: 14px;
    }

    button {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background: #c73652; transform: translateY(-2px); }
  </style>
</head>
<body>

  <div class="top-bar">
    <a class="home-btn" href="index.html">← 홈으로</a>
    <h1>카드 뒤집기</h1>
    <div style="width:72px"></div>
  </div>

  <div class="info-bar">
    <div>이동: <span id="moves">0</span>회</div>
    <div>시간: <span id="timer">0</span>초</div>
  </div>

  <div id="grid"></div>
  <div id="message"></div>

  <div class="btn-row">
    <button onclick="newGame()">새 게임</button>
  </div>

  <script>
    const EMOJIS = ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝'];

    let cards, flipped, matched, moves, timerInterval, elapsed, locked;

    function newGame() {
      clearInterval(timerInterval);
      const pairs = [...EMOJIS, ...EMOJIS];
      for (let i = pairs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
      }
      cards = pairs;
      flipped = [];
      matched = new Set();
      moves = 0;
      elapsed = 0;
      locked = false;
      document.getElementById('moves').textContent = 0;
      document.getElementById('timer').textContent = 0;
      document.getElementById('message').textContent = '';
      timerInterval = setInterval(() => {
        elapsed++;
        document.getElementById('timer').textContent = elapsed;
      }, 1000);
      render();
    }

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      cards.forEach((emoji, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        if (flipped.includes(i) || matched.has(i)) {
          wrap.classList.add(matched.has(i) ? 'matched' : 'flipped');
        }

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        const front = document.createElement('div');
        front.className = 'card-front';
        front.textContent = '?';

        const back = document.createElement('div');
        back.className = 'card-back';
        back.textContent = emoji;

        inner.appendChild(front);
        inner.appendChild(back);
        wrap.appendChild(inner);

        wrap.addEventListener('click', () => handleClick(i));
        grid.appendChild(wrap);
      });
    }

    function handleClick(i) {
      if (locked || flipped.includes(i) || matched.has(i)) return;

      flipped.push(i);
      render();

      if (flipped.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        locked = true;

        const [a, b] = flipped;
        if (cards[a] === cards[b]) {
          matched.add(a);
          matched.add(b);
          flipped = [];
          locked = false;
          render();
          if (matched.size === cards.length) {
            clearInterval(timerInterval);
            document.getElementById('message').textContent =
              `완성! ${moves}회 이동, ${elapsed}초 소요!`;
          }
        } else {
          setTimeout(() => {
            flipped = [];
            locked = false;
            render();
          }, 900);
        }
      }
    }

    newGame();
  </script>
</body>
</html>
