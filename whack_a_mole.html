<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두더지 잡기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .top-bar {
      width: 100%;
      max-width: 380px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .home-btn {
      padding: 6px 14px;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .home-btn:hover { border-color: #e94560; color: #eee; }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    .info-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 18px;
      font-size: 1.1rem;
    }

    .info-bar span { color: #e94560; font-weight: bold; }

    #grid {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 12px;
      background: #16213e;
      padding: 14px;
      border-radius: 8px;
      border: 2px solid #e94560;
    }

    .hole {
      width: 110px;
      height: 110px;
      background: #0f3460;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, transform 0.1s;
      border: 3px solid #1a5a9a;
      position: relative;
      overflow: hidden;
    }

    .hole.active {
      background: #1a4a1a;
      border-color: #2ecc71;
    }

    .hole.active:hover {
      background: #2a6a2a;
      transform: scale(1.06);
    }

    .hole .mole {
      position: absolute;
      font-size: 3rem;
      transition: bottom 0.15s;
      bottom: -110px;
      left: 50%;
      transform: translateX(-50%);
    }

    .hole.active .mole {
      bottom: 8px;
    }

    .hole.whacked .mole {
      bottom: -110px;
    }

    #message {
      margin-top: 18px;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 32px;
      color: #f1c40f;
      text-align: center;
    }

    .btn-row {
      margin-top: 14px;
    }

    button {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background: #c73652; transform: translateY(-2px); }

    .hint {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a class="home-btn" href="index.html">← 홈으로</a>
    <h1>두더지 잡기</h1>
    <div style="width:72px"></div>
  </div>

  <div class="info-bar">
    <div>점수: <span id="score">0</span></div>
    <div>시간: <span id="timer">60</span>초</div>
  </div>

  <div id="grid"></div>
  <div id="message">시작 버튼을 누르세요</div>

  <div class="btn-row">
    <button id="startBtn" onclick="startGame()">시작</button>
  </div>
  <div class="hint">두더지가 올라오면 클릭하세요!</div>

  <script>
    const HOLES = 9;
    let score, timeLeft, running;
    let moleTimeout, countdownInterval;
    let activeHole = -1;

    function buildGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let i = 0; i < HOLES; i++) {
        const hole = document.createElement('div');
        hole.className = 'hole';
        hole.id = `hole-${i}`;
        const mole = document.createElement('span');
        mole.className = 'mole';
        mole.textContent = '🐹';
        hole.appendChild(mole);
        hole.addEventListener('click', () => whack(i));
        grid.appendChild(hole);
      }
    }

    function startGame() {
      clearTimeout(moleTimeout);
      clearInterval(countdownInterval);

      score = 0;
      timeLeft = 60;
      running = true;
      activeHole = -1;

      document.getElementById('score').textContent = 0;
      document.getElementById('timer').textContent = 60;
      document.getElementById('message').textContent = '';
      document.getElementById('startBtn').textContent = '재시작';

      buildGrid();

      countdownInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);

      scheduleMole();
    }

    function scheduleMole() {
      if (!running) return;

      hideMole();

      const elapsed = 60 - timeLeft;
      const minDelay = Math.max(400, 800 - elapsed * 6);
      const maxDelay = Math.max(800, 2000 - elapsed * 10);
      const delay = minDelay + Math.random() * (maxDelay - minDelay);

      moleTimeout = setTimeout(() => {
        showMole();
        const showDuration = Math.max(600, 1400 - elapsed * 8);
        moleTimeout = setTimeout(() => {
          scheduleMole();
        }, showDuration);
      }, delay);
    }

    function showMole() {
      let next;
      do { next = Math.floor(Math.random() * HOLES); }
      while (next === activeHole);

      activeHole = next;
      const hole = document.getElementById(`hole-${activeHole}`);
      hole.classList.add('active');
    }

    function hideMole() {
      if (activeHole < 0) return;
      const hole = document.getElementById(`hole-${activeHole}`);
      if (hole) hole.classList.remove('active', 'whacked');
      activeHole = -1;
    }

    function whack(i) {
      if (!running || i !== activeHole) return;
      score += 10;
      document.getElementById('score').textContent = score;

      const hole = document.getElementById(`hole-${i}`);
      hole.classList.remove('active');
      hole.classList.add('whacked');
      activeHole = -1;

      clearTimeout(moleTimeout);
      moleTimeout = setTimeout(() => {
        hole.classList.remove('whacked');
        scheduleMole();
      }, 200);
    }

    function endGame() {
      running = false;
      clearTimeout(moleTimeout);
      clearInterval(countdownInterval);
      hideMole();
      document.getElementById('message').textContent = `게임 종료! 최종 점수: ${score}점`;
    }

    buildGrid();
  </script>
</body>
</html>
